version: "3.9"

# ══════════════════════════════════════════════════════════════════
#  Catatanku — Production Docker Compose
# ══════════════════════════════════════════════════════════════════

services:

  # ── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Security: no external port exposure
    expose:
      - "5432"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  # ── Redis (rate limit store) ──────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
    networks:
      - backend
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 160M

  # ── Flask App ─────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      DATABASE_URL:    postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL:       redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY:      ${SECRET_KEY}
      JWT_SECRET_KEY:  ${JWT_SECRET_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      FLASK_ENV:       production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro          # mount SSL certs
      - static_files:/usr/share/nginx/html:ro      # frontend static
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 64M

  # ── DB Backup (daily) ─────────────────────────────────────────
  db_backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_backups:/backups
    entrypoint: >
      sh -c "
        while true; do
          FNAME=/backups/catatanku_$$(date +%Y%m%d_%H%M%S).sql.gz;
          pg_dump -h db -U ${POSTGRES_USER} ${POSTGRES_DB} | gzip > $$FNAME;
          echo \"[backup] $$FNAME saved\";
          find /backups -name '*.sql.gz' -mtime +7 -delete;
          sleep 86400;
        done
      "
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M


# ── VOLUMES ──────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  static_files:
    driver: local
  db_backups:
    driver: local


# ── NETWORKS ──────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
    internal: true      # DB & app tidak bisa diakses langsung dari luar
  frontend:
    driver: bridge
